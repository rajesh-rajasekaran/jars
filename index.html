<script>
  // ... (same variables)

  processBtn.onclick = async () => {
    const files = fileInput.files;
    if (!files.length) return alert('Select files');

    allData = []; filtered = []; fileColors = {};
    output.innerHTML = '<p class="no-data">Processing...</p>';
    progress.style.display = 'block';
    progressText.textContent = 'Uploading...';
    exportBtn.disabled = true;

    const formData = [];
    for (let file of files) {
      const dataUrl = await new Promise(res => {
        const reader = new FileReader();
        reader.onload = e => res(e.target.result);
        reader.readAsDataURL(file);
      });
      formData.push({ name: file.name, data: dataUrl });
    }

    // === CORRECT: Use fetch + manual EventSource ===
    const response = await fetch('/api/process', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ files: formData })
    });

    if (!response.ok) {
      alert('Server error');
      return;
    }

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    const processChunk = ({ done, value }) => {
      if (done) {
        progress.style.display = 'none';
        return;
      }

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n\n');
      buffer = lines.pop(); // leftover

      lines.forEach(line => {
        if (!line.startsWith('data: ')) return;
        const jsonStr = line.slice(6);
        try {
          const msg = JSON.parse(jsonStr);
          if (msg.type === 'progress') {
            progressBar.style.width = msg.percent + '%';
            progressText.textContent = msg.message;
          } else if (msg.type === 'done') {
            allData = msg.data;
            fileColors = msg.colors;
            filtered = [...allData];
            renderAll();
            exportBtn.disabled = false;
            progress.style.display = 'none';
          } else if (msg.type === 'error') {
            alert('Error: ' + msg.message);
            progress.style.display = 'none';
          }
        } catch (e) {}
      });

      reader.read().then(processChunk);
    };

    reader.read().then(processChunk);
  };

  // ... rest of script unchanged
</script>
